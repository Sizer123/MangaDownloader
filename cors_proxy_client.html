<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Manga Viewer</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .control-panel { margin-bottom: 20px; display: flex; gap: 10px; }
        #urlInput { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #4a6fa5; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #status { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e9; color: #2e7d32; }
        #contentFrame { width: 100%; height: 80vh; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="control-panel">
            <input type="text" id="urlInput" value="https://phenix-scans.com" placeholder="Enter manga URL">
            <button id="loadBtn">Load</button>
        </div>
        <div id="status">Ready</div>
        <iframe id="contentFrame" sandbox="allow-same-origin"></iframe>
    </div>

    <script>
        document.getElementById('loadBtn').addEventListener('click', loadContent);
        
        async function loadContent() {
            const url = document.getElementById('urlInput').value.trim();
            const status = document.getElementById('status');
            const frame = document.getElementById('contentFrame');
            
            if (!url) {
                showStatus('Please enter a URL', 'error');
                return;
            }
            
            try {
                showStatus('Loading...', '');
                
                const proxyUrl = `http://localhost:5000/proxy-content?url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                
                if (!response.ok) {
                    const error = await response.json().catch(() => ({ error: 'Proxy error' }));
                    throw new Error(error.error);
                }
                
                const html = await response.text();
                frame.srcdoc = html;
                showStatus('Content loaded successfully', 'success');
            } catch (error) {
                showStatus(`Error: ${error.message}`, 'error');
                console.error('Loading error:', error);
            }
        }
        
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = type;
        }
        
        // Load default URL
        window.addEventListener('DOMContentLoaded', loadContent);
    </script>
</body>
</html>
