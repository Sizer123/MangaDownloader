<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga Scraper avec iFrame</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 2.2em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        input[type="text"], input[type="number"], input[type="checkbox"] {
            margin-right: 10px;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .settings {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-start {
            background: #4CAF50;
            color: white;
        }

        .btn-stop {
            background: #f44336;
            color: white;
        }

        .btn-download {
            background: #2196F3;
            color: white;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
            text-align: center;
            background: #e3f2fd;
            color: #1565c0;
        }

        .progress-section {
            margin-bottom: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(45deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            font-weight: bold;
            color: #555;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #e9ecef;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        .log-container {
            background: #2d3748;
            color: #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.4;
        }

        .log-entry {
            margin-bottom: 5px;
            padding: 3px 6px;
            border-radius: 3px;
        }

        .log-info {
            background: rgba(56, 178, 172, 0.1);
            color: #4fd1c7;
        }

        .log-success {
            background: rgba(72, 187, 120, 0.1);
            color: #68d391;
        }

        .log-warn {
            background: rgba(237, 137, 54, 0.1);
            color: #f6ad55;
        }

        .log-error {
            background: rgba(245, 101, 101, 0.1);
            color: #fc8181;
        }

        .chapter-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            background: #f9f9f9;
        }

        .chapter-item {
            padding: 8px;
            margin-bottom: 5px;
            background: white;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chapter-item.processing {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
        }

        .chapter-item.completed {
            background: #d4edda;
            border-left: 4px solid #28a745;
        }

        .chapter-item.error {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
        }

        .iframe-container {
            width: 100%;
            height: 400px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #mangaFrame {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .settings {
                grid-template-columns: 1fr;
            }
            
            .controls {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Manga Scraper avec iFrame</h1>
        
        <div class="form-group">
            <label for="mangaUrl">URL du Manga:</label>
            <input type="text" id="mangaUrl" value="https://phenix-scans.com/manga/a-modern-man-who-transmigrated-into-the-murim-world">
        </div>
        
        <div class="form-group">
            <label for="useIframe">
                <input type="checkbox" id="useIframe" checked>
                Utiliser une iframe (pour contourner CORS)
            </label>
        </div>
        
        <div class="iframe-container" id="iframeContainer">
            <iframe id="mangaFrame" sandbox="allow-same-origin allow-scripts"></iframe>
        </div>
        
        <div class="settings">
            <div class="form-group">
                <label for="delayInput">Délai entre requêtes (ms):</label>
                <input type="number" id="delayInput" value="1000" min="500" max="5000">
            </div>
            <div class="form-group">
                <label for="maxRetries">Tentatives max:</label>
                <input type="number" id="maxRetries" value="3" min="1" max="10">
            </div>
        </div>
        
        <div class="controls">
            <button id="startBtn" class="btn-start">🚀 Démarrer</button>
            <button id="stopBtn" class="btn-stop" disabled>⏹️ Arrêter</button>
            <button id="downloadBtn" class="btn-download" disabled>💾 Télécharger</button>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="chaptersFound">0</div>
                <div class="stat-label">Chapitres trouvés</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="chaptersProcessed">0</div>
                <div class="stat-label">Chapitres traités</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalImages">0</div>
                <div class="stat-label">Images totales</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="timeElapsed">0s</div>
                <div class="stat-label">Temps écoulé</div>
            </div>
        </div>
        
        <div class="status" id="status">Prêt à démarrer</div>
        
        <div class="progress-section">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">0%</div>
        </div>
        
        <div class="form-group">
            <label>Chapitres détectés:</label>
            <div class="chapter-list" id="chapterList">
                Aucun chapitre détecté
            </div>
        </div>
        
        <div class="log-container" id="logContainer"></div>
    </div>

    <script>
        class SimpleMangaScraper {
            constructor() {
                this.baseUrl = '';
                this.delay = 1000;
                this.maxRetries = 3;
                this.shouldStop = false;
                this.startTime = null;
                this.chapters = [];
                this.currentChapter = 0;
                this.result = {
                    mangaTitle: '',
                    chapters: [],
                    totalImages: 0,
                    createdAt: new Date().toISOString()
                };
                
                this.initializeElements();
                this.setupEventListeners();
            }
            
            initializeElements() {
                this.elements = {
                    startBtn: document.getElementById('startBtn'),
                    stopBtn: document.getElementById('stopBtn'),
                    downloadBtn: document.getElementById('downloadBtn'),
                    status: document.getElementById('status'),
                    progressFill: document.getElementById('progressFill'),
                    progressText: document.getElementById('progressText'),
                    logContainer: document.getElementById('logContainer'),
                    chapterList: document.getElementById('chapterList'),
                    chaptersFound: document.getElementById('chaptersFound'),
                    chaptersProcessed: document.getElementById('chaptersProcessed'),
                    totalImages: document.getElementById('totalImages'),
                    timeElapsed: document.getElementById('timeElapsed'),
                    iframe: document.getElementById('mangaFrame'),
                    useIframe: document.getElementById('useIframe'),
                    iframeContainer: document.getElementById('iframeContainer')
                };
            }
            
            setupEventListeners() {
                this.elements.startBtn.addEventListener('click', () => this.startScraping());
                this.elements.stopBtn.addEventListener('click', () => this.stopScraping());
                this.elements.downloadBtn.addEventListener('click', () => this.downloadResult());
                
                this.elements.useIframe.addEventListener('change', (e) => {
                    this.elements.iframeContainer.style.display = e.target.checked ? 'block' : 'none';
                });
            }
            
            log(message, type = 'info') {
                const timestamp = new Date().toLocaleTimeString();
                const logEntry = document.createElement('div');
                logEntry.className = `log-entry log-${type}`;
                logEntry.textContent = `[${timestamp}] ${message}`;
                
                this.elements.logContainer.appendChild(logEntry);
                this.elements.logContainer.scrollTop = this.elements.logContainer.scrollHeight;
                
                if (this.elements.logContainer.children.length > 100) {
                    this.elements.logContainer.removeChild(this.elements.logContainer.firstChild);
                }
                
                console.log(`[${type.toUpperCase()}] ${message}`);
            }
            
            updateStatus(message) {
                this.elements.status.textContent = message;
            }
            
            updateProgress(value, text) {
                this.elements.progressFill.style.width = `${value}%`;
                this.elements.progressText.textContent = text;
            }
            
            updateStats() {
                this.elements.chaptersFound.textContent = this.chapters.length;
                this.elements.chaptersProcessed.textContent = this.currentChapter;
                this.elements.totalImages.textContent = this.result.totalImages;
                
                if (this.startTime) {
                    const elapsed = Math.floor((Date.now() - this.startTime) / 1000);
                    this.elements.timeElapsed.textContent = this.formatTime(elapsed);
                }
            }
            
            formatTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            }
            
            async fetchWithRetry(url, options = {}) {
                let lastError;
                
                for (let attempt = 1; attempt <= this.maxRetries; attempt++) {
                    if (this.shouldStop) throw new Error('Scraping arrêté');
                    
                    try {
                        const response = await fetch(url, {
                            ...options,
                            headers: {
                                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                                'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8',
                                'Accept-Language': 'en-US,en;q=0.5',
                                'Accept-Encoding': 'gzip, deflate',
                                'Connection': 'keep-alive',
                                'Upgrade-Insecure-Requests': '1',
                                ...options.headers
                            }
                        });
                        
                        if (!response.ok) {
                            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                        }
                        
                        const text = await response.text();
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(text, 'text/html');
                        
                        if (attempt > 1) {
                            this.log(`✅ Succès après ${attempt} tentatives`, 'success');
                        }
                        
                        return doc;
                        
                    } catch (error) {
                        lastError = error;
                        this.log(`❌ Tentative ${attempt}/${this.maxRetries}: ${error.message}`, 'warn');
                        
                        if (attempt < this.maxRetries) {
                            const waitTime = Math.min(1000 * Math.pow(2, attempt - 1), 5000);
                            this.log(`⏳ Attente ${waitTime}ms...`, 'info');
                            await this.sleep(waitTime);
                        }
                    }
                }
                
                throw lastError;
            }
            
            async getDocument(url) {
                if (this.elements.useIframe.checked) {
                    return this.getDocumentViaIframe(url);
                } else {
                    return this.fetchWithRetry(url);
                }
            }
            
            async getDocumentViaIframe(url) {
                return new Promise((resolve, reject) => {
                    this.elements.iframe.onload = () => {
                        try {
                            const iframeDoc = this.elements.iframe.contentDocument || this.elements.iframe.contentWindow.document;
                            const parser = new DOMParser();
                            const doc = parser.parseFromString(iframeDoc.documentElement.outerHTML, 'text/html');
                            resolve(doc);
                        } catch (error) {
                            reject(error);
                        }
                    };
                    
                    this.elements.iframe.onerror = () => {
                        reject(new Error('Erreur de chargement de l\'iframe'));
                    };
                    
                    this.elements.iframe.src = url;
                });
            }
            
            sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
            
            sanitizeFilename(filename) {
                return filename.replace(/[<>:"/\\|?*]/g, '_')
                    .trim()
                    .replace(/\s+/g, ' ')
                    .substring(0, 100);
            }
            
            async getMangaTitle() {
                this.log('🔍 Récupération du titre...', 'info');
                const doc = await this.getDocument(this.baseUrl);
                
                const selectors = [
                    'h1.project__title',
                    '.manga-title',
                    'h1',
                    'title'
                ];
                
                for (const selector of selectors) {
                    const element = doc.querySelector(selector);
                    if (element && element.textContent.trim()) {
                        const title = this.sanitizeFilename(element.textContent.trim());
                        this.result.mangaTitle = title;
                        this.log(`📚 Titre trouvé: ${title}`, 'success');
                        return title;
                    }
                }
                
                const title = 'manga_inconnu';
                this.result.mangaTitle = title;
                this.log(`⚠️ Titre par défaut: ${title}`, 'warn');
                return title;
            }
            
            async getChapterLinks() {
                this.log('🔍 Recherche des chapitres...', 'info');
                const doc = await this.getDocument(this.baseUrl);
                
                const selectors = [
                    'a.project__chapter.unstyled-link',
                    'a[href*="chapter"]',
                    'a[href*="chapitre"]',
                    '.chapter-link',
                    '.chapter-item a'
                ];
                
                const links = [];
                
                for (const selector of selectors) {
                    const elements = doc.querySelectorAll(selector);
                    if (elements.length > 0) {
                        elements.forEach(el => {
                            const href = el.href;
                            if (href && (href.includes('chapter') || href.includes('chapitre'))) {
                                let title = el.textContent.trim() || el.title || '';
                                if (!title) {
                                    const segments = href.split('/');
                                    title = segments[segments.length - 1];
                                }
                                links.push({
                                    url: href,
                                    title: this.sanitizeFilename(title),
                                    status: 'pending'
                                });
                            }
                        });
                        break;
                    }
                }
                
                const uniqueLinks = [];
                const seenUrls = new Set();
                
                for (const chapter of links) {
                    if (!seenUrls.has(chapter.url)) {
                        uniqueLinks.push(chapter);
                        seenUrls.add(chapter.url);
                    }
                }
                
                uniqueLinks.sort((a, b) => {
                    const numA = this.extractChapterNumber(a.title);
                    const numB = this.extractChapterNumber(b.title);
                    return numA - numB;
                });
                
                this.chapters = uniqueLinks;
                this.log(`📖 ${uniqueLinks.length} chapitres trouvés`, 'success');
                this.displayChapterList();
                
                return uniqueLinks;
            }
            
            extractChapterNumber(text) {
                const matches = text.match(/(\d+(?:\.\d+)?)/);
                return matches ? parseFloat(matches[0]) : 0;
            }
            
            displayChapterList() {
                this.elements.chapterList.innerHTML = '';
                
                this.chapters.forEach((chapter, index) => {
                    const item = document.createElement('div');
                    item.className = `chapter-item ${chapter.status}`;
                    item.innerHTML = `
                        <span>${chapter.title}</span>
                        <span class="chapter-status">${this.getStatusText(chapter.status)}</span>
                    `;
                    item.setAttribute('data-index', index);
                    this.elements.chapterList.appendChild(item);
                });
            }
            
            getStatusText(status) {
                switch (status) {
                    case 'pending': return '⏳';
                    case 'processing': return '🔄';
                    case 'completed': return '✅';
                    case 'error': return '❌';
                    default: return '';
                }
            }
            
            updateChapterStatus(index, status) {
                if (this.chapters[index]) {
                    this.chapters[index].status = status;
                    const item = this.elements.chapterList.querySelector(`[data-index="${index}"]`);
                    if (item) {
                        item.className = `chapter-item ${status}`;
                        item.querySelector('.chapter-status').textContent = this.getStatusText(status);
                    }
                }
            }
            
            async getChapterImages(chapterUrl) {
                const doc = await this.getDocument(chapterUrl);
                
                const selectors = [
                    'img.chapter-image',
                    '.chapter-content img',
                    '.reader-content img',
                    '.page-image img',
                    'img[src*="chapter"]',
                    'img[data-src*="chapter"]'
                ];
                
                const images = [];
                
                for (const selector of selectors) {
                    const elements = doc.querySelectorAll(selector);
                    if (elements.length > 0) {
                        elements.forEach(img => {
                            const src = img.src || img.getAttribute('data-src') || img.getAttribute('data-lazy-src');
                            if (src && !src.includes('avatar') && !src.includes('logo') && !src.includes('placeholder')) {
                                images.push({
                                    src: src,
                                    alt: img.alt || '',
                                    width: img.width || 0,
                                    height: img.height || 0
                                });
                            }
                        });
                        if (images.length > 0) break;
                    }
                }
                
                this.log(`🖼️ ${images.length} images trouvées`, 'info');
                return images;
            }
            
            async startScraping() {
                try {
                    this.baseUrl = document.getElementById('mangaUrl').value.trim();
                    this.delay = parseInt(document.getElementById('delayInput').value) || 1000;
                    this.maxRetries = parseInt(document.getElementById('maxRetries').value) || 3;
                    
                    if (!this.baseUrl) {
                        alert('⚠️ Veuillez entrer une URL');
                        return;
                    }
                    
                    this.shouldStop = false;
                    this.startTime = Date.now();
                    this.currentChapter = 0;
                    this.result = {
                        mangaTitle: '',
                        chapters: [],
                        totalImages: 0,
                        createdAt: new Date().toISOString()
                    };
                    
                    this.elements.startBtn.disabled = true;
                    this.elements.stopBtn.disabled = false;
                    this.elements.downloadBtn.disabled = true;
                    this.elements.logContainer.innerHTML = '';
                    
                    this.log('🚀 Début du scraping...', 'info');
                    this.updateStatus('Initialisation...');
                    
                    const timer = setInterval(() => {
                        if (this.shouldStop) {
                            clearInterval(timer);
                            return;
                        }
                        this.updateStats();
                    }, 1000);
                    
                    await this.getMangaTitle();
                    this.updateStatus(`Scraping: ${this.result.mangaTitle}`);
                    
                    const chapters = await this.getChapterLinks();
                    if (chapters.length === 0) {
                        throw new Error('Aucun chapitre trouvé');
                    }
                    
                    this.updateStats();
                    
                    for (let i = 0; i < chapters.length; i++) {
                        if (this.shouldStop) break;
                        
                        this.currentChapter = i + 1;
                        const chapter = chapters[i];
                        
                        this.log(`📖 Traitement ${i + 1}/${chapters.length}: ${chapter.title}`, 'info');
                        this.updateChapterStatus(i, 'processing');
                        this.updateProgress((i / chapters.length) * 100, `Chapitre ${i + 1}/${chapters.length}`);
                        this.updateStats();
                        
                        try {
                            const images = await this.getChapterImages(chapter.url);
                            
                            this.result.chapters.push({
                                title: chapter.title,
                                url: chapter.url,
                                images: images,
                                pageCount: images.length
                            });
                            
                            this.result.totalImages += images.length;
                            this.updateChapterStatus(i, 'completed');
                            
                            this.log(`✅ Chapitre terminé: ${images.length} images`, 'success');
                            
                        } catch (error) {
                            this.log(`❌ Erreur chapitre ${chapter.title}: ${error.message}`, 'error');
                            this.updateChapterStatus(i, 'error');
                        }
                        
                        if (i < chapters.length - 1 && !this.shouldStop) {
                            await this.sleep(this.delay);
                        }
                    }
                    
                    clearInterval(timer);
                    
                    if (this.shouldStop) {
                        this.log('🛑 Scraping arrêté par l\'utilisateur', 'warn');
                        this.updateStatus('Arrêté');
                    } else {
                        this.log(`🎉 Scraping terminé! ${this.result.chapters.length} chapitres, ${this.result.totalImages} images`, 'success');
                        this.updateStatus(`✅ Terminé! ${this.result.chapters.length} chapitres, ${this.result.totalImages} images`);
                        this.updateProgress(100, 'Terminé');
                        this.elements.downloadBtn.disabled = false;
                    }
                    
                } catch (error) {
                    this.log(`💥 Erreur critique: ${error.message}`, 'error');
                    this.updateStatus(`❌ Erreur: ${error.message}`);
                } finally {
                    this.elements.startBtn.disabled = false;
                    this.elements.stopBtn.disabled = true;
                    this.updateStats();
                }
            }
            
            stopScraping() {
                this.shouldStop = true;
                this.log('🛑 Arrêt demandé...', 'warn');
                this.updateStatus('Arrêt en cours...');
            }
            
            downloadResult() {
                if (!this.result.chapters.length) {
                    alert('⚠️ Aucune donnée à télécharger');
                    return;
                }
                
                const blob = new Blob([JSON.stringify(this.result, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${this.result.mangaTitle || 'manga'}_data.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                this.log('💾 Fichier téléchargé', 'success');
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            new SimpleMangaScraper();
        });
    </script>
</body>
</html>
