<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manga Scraper Optimisé</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        button:hover:before {
            left: 100%;
        }

        #startBtn {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
        }

        #stopBtn {
            background: linear-gradient(45deg, #f44336, #da190b);
            color: white;
        }

        #downloadBtn {
            background: linear-gradient(45deg, #2196F3, #0b7dda);
            color: white;
        }

        #pauseBtn {
            background: linear-gradient(45deg, #FF9800, #e68900);
            color: white;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 600;
            background: linear-gradient(45deg, #e3f2fd, #bbdefb);
            color: #1565c0;
            text-align: center;
        }

        .progress-container {
            margin-bottom: 20px;
        }

        progress {
            width: 100%;
            height: 20px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        progress::-webkit-progress-bar {
            background-color: #e1e5e9;
            border-radius: 10px;
        }

        progress::-webkit-progress-value {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border-radius: 10px;
        }

        #progressText {
            text-align: center;
            font-weight: 600;
            color: #555;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(45deg, #f8f9fa, #e9ecef);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #dee2e6;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            color: #6c757d;
        }

        #log {
            background: #1a1a1a;
            color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        .log-entry {
            margin-bottom: 8px;
            padding: 4px 8px;
            border-radius: 4px;
            border-left: 3px solid transparent;
        }

        .log-info {
            border-left-color: #4CAF50;
            background: rgba(76, 175, 80, 0.1);
        }

        .log-warn {
            border-left-color: #FF9800;
            background: rgba(255, 152, 0, 0.1);
        }

        .log-error {
            border-left-color: #f44336;
            background: rgba(244, 67, 54, 0.1);
        }

        .log-success {
            border-left-color: #2196F3;
            background: rgba(33, 150, 243, 0.1);
        }

        .iframe-container {
            margin-bottom: 20px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            overflow: hidden;
            background: #f8f9fa;
        }

        .iframe-header {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 10px 15px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .iframe-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .iframe-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        iframe {
            width: 100%;
            height: 400px;
            border: none;
            display: block;
            background: white;
        }

        .iframe-collapsed iframe {
            height: 0;
            overflow: hidden;
        }

        .performance-info {
            background: linear-gradient(45deg, #fff3e0, #ffcc02);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #ff9800;
        }

        @media (max-width: 768px) {
            .settings-grid {
                grid-template-columns: 1fr;
            }
            
            .controls {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Manga Scraper Optimisé</h1>
        
        <div class="performance-info">
            <strong>⚡ Optimisations activées :</strong> Cache intelligent, traitement parallèle, gestion d'erreurs avancée, retry automatique
        </div>
        
        <div class="form-group">
            <label for="mangaUrl">📖 URL du Manga:</label>
            <input type="text" id="mangaUrl" value="https://phenix-scans.com/manga/a-modern-man-who-transmigrated-into-the-murim-world">
        </div>
        
        <div class="settings-grid">
            <div class="form-group">
                <label for="delayInput">⏱️ Délai entre requêtes (ms):</label>
                <input type="number" id="delayInput" value="800" min="100" max="5000">
            </div>
            <div class="form-group">
                <label for="maxRetries">🔄 Tentatives max par page:</label>
                <input type="number" id="maxRetries" value="3" min="1" max="10">
            </div>
        </div>
        
        <div class="controls">
            <button id="startBtn">🚀 Démarrer</button>
            <button id="pauseBtn" disabled>⏸️ Pause</button>
            <button id="stopBtn" disabled>⏹️ Arrêter</button>
            <button id="downloadBtn" disabled>💾 Télécharger JSON</button>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="chaptersCount">0</div>
                <div class="stat-label">Chapitres trouvés</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="imagesCount">0</div>
                <div class="stat-label">Images totales</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="processedCount">0</div>
                <div class="stat-label">Chapitres traités</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="timeElapsed">0s</div>
                <div class="stat-label">Temps écoulé</div>
            </div>
        </div>
        
        <div class="iframe-container" id="iframeContainer">
            <div class="iframe-header">
                <span>🌐 Navigateur de scraping</span>
                <button class="iframe-toggle" id="iframeToggle">Réduire</button>
            </div>
            <iframe id="scraperFrame" sandbox="allow-same-origin allow-scripts"></iframe>
        </div>
        
        <div class="status" id="status">🎯 Prêt à démarrer</div>
        <div class="progress-container">
            <progress id="progressBar" value="0" max="100"></progress>
            <div id="progressText">0%</div>
        </div>
        
        <div id="log"></div>
    </div>

    <script>
        class OptimizedMangaScraper {
            constructor(baseUrl, delay = 800, maxRetries = 3, updateCallback) {
                this.baseUrl = baseUrl;
                this.delay = delay;
                this.maxRetries = maxRetries;
                this.updateCallback = updateCallback;
                this.shouldStop = false;
                this.isPaused = false;
                this.startTime = null;
                this.cache = new Map();
                this.result = {
                    mangaTitle: "",
                    chapters: [],
                    totalImages: 0,
                    scrapingTime: 0,
                    createdAt: new Date().toISOString(),
                    settings: {
                        delay: this.delay,
                        maxRetries: this.maxRetries
                    }
                };
                this.iframe = document.getElementById('scraperFrame');
                this.currentChapterIndex = 0;
                this.retryCount = 0;
            }

            log(message, level = 'info') {
                const timestamp = new Date().toLocaleTimeString();
                const logLine = `[${timestamp}] ${message}`;
                console.log(logLine);
                this.updateCallback('log', { message: logLine, level });
            }

            async navigateTo(url) {
                // Vérifier le cache
                if (this.cache.has(url)) {
                    this.log(`📋 Utilisation du cache pour: ${url}`, 'info');
                    return this.cache.get(url);
                }

                return new Promise((resolve, reject) => {
                    const timeout = setTimeout(() => {
                        reject(new Error('Navigation timeout'));
                    }, 15000);

                    this.iframe.src = url;
                    this.iframe.onload = () => {
                        clearTimeout(timeout);
                        setTimeout(() => {
                            this.cache.set(url, true);
                            resolve();
                        }, this.delay);
                    };
                    this.iframe.onerror = () => {
                        clearTimeout(timeout);
                        reject(new Error('Navigation failed'));
                    };
                });
            }

            async executeInFrame(code) {
                return new Promise((resolve, reject) => {
                    const timeout = setTimeout(() => {
                        reject(new Error('Execution timeout'));
                    }, 10000);

                    const listener = (event) => {
                        if (event.data.type === 'result') {
                            clearTimeout(timeout);
                            window.removeEventListener('message', listener);
                            resolve(event.data.result);
                        } else if (event.data.type === 'error') {
                            clearTimeout(timeout);
                            window.removeEventListener('message', listener);
                            reject(new Error(event.data.error));
                        }
                    };
                    window.addEventListener('message', listener);
                    
                    try {
                        this.iframe.contentWindow.postMessage({
                            type: 'execute',
                            code: code
                        }, '*');
                    } catch (error) {
                        clearTimeout(timeout);
                        window.removeEventListener('message', listener);
                        reject(error);
                    }
                });
            }

            async retryOperation(operation, maxRetries = this.maxRetries) {
                let lastError;
                for (let attempt = 1; attempt <= maxRetries; attempt++) {
                    try {
                        if (this.shouldStop) throw new Error('Operation stopped');
                        
                        const result = await operation();
                        if (attempt > 1) {
                            this.log(`✅ Succès après ${attempt} tentatives`, 'success');
                        }
                        return result;
                    } catch (error) {
                        lastError = error;
                        this.log(`❌ Tentative ${attempt}/${maxRetries} échouée: ${error.message}`, operation, 'warn');
                        
                        if (attempt < maxRetries) {
                            const backoffDelay = this.delay * Math.pow(2, attempt - 1);
                            this.log(`⏳ Attente ${backoffDelay}ms avant retry...`, 'info');
                            await new Promise(resolve => setTimeout(resolve, backoffDelay));
                        }
                    }
                }
                throw lastError;
            }

            sanitizeFilename(filename) {
                return filename.replace(/[<>:"/\\|?*]/g, '_')
                    .trim()
                    .replace(/\s+/g, ' ')
                    .substring(0, 100);
            }

            async getMangaTitle() {
                return await this.retryOperation(async () => {
                    await this.navigateTo(this.baseUrl);
                    const doc = await this.executeInFrame(`
                        (function() {
                            const selectors = [
                                'h1.project__content-informations-title',
                                
                            ];
                            
                            for (const selector of selectors) {
                                const el = document.querySelector(selector);
                                if (el && el.textContent.trim()) {
                                    return el.textContent.trim();
                                }
                            }
                            return document.title;
                        })();
                    `);
                    
                    const title = this.sanitizeFilename(doc);
                    this.result.mangaTitle = title;
                    this.log(`📚 Titre trouvé: ${title}`, 'success');
                    return title;
                });
            }

            async getChapterLinks() {
                return await this.retryOperation(async () => {
                    await this.navigateTo(this.baseUrl);
                    const result = await this.executeInFrame(`
                        (function() {
                            const selectors = [
                                'a.project__chapter.unstyled-link',
                                'a[href*="chapter"]',
                                'a[href*="chapitre"]',
                                '.chapter-link',
                                '.chapter-item a'
                            ];
                            
                            const links = [];
                            for (const selector of selectors) {
                                const elements = document.querySelectorAll(selector);
                                if (elements.length > 0) {
                                    elements.forEach(el => {
                                        const href = el.href;
                                        if (href && (href.includes('chapter') || href.includes('chapitre'))) {
                                            let title = el.textContent.trim() || el.title || el.getAttribute('aria-label') || '';
                                            if (!title) {
                                                const segments = href.split('/');
                                                title = segments[segments.length - 1];
                                            }
                                            links.push({
                                                url: href,
                                                title: title
                                            });
                                        }
                                    });
                                    break;
                                }
                            }
                            return links;
                        })();
                    `);
                    
                    // Supprimer les doublons et trier
                    const uniqueLinks = [];
                    const seenUrls = new Set();
                    for (const chapter of result) {
                        if (!seenUrls.has(chapter.url)) {
                            uniqueLinks.push({
                                url: chapter.url,
                                title: this.sanitizeFilename(chapter.title)
                            });
                            seenUrls.add(chapter.url);
                        }
                    }
                    
                    const sortedChapters = this.sortChapters(uniqueLinks);
                    this.log(`📖 ${sortedChapters.length} chapitres trouvés`, 'success');
                    this.updateCallback('stats', { chapters: sortedChapters.length });
                    return sortedChapters;
                });
            }

            sortChapters(chapters) {
                return chapters.sort((a, b) => {
                    const numA = this.extractChapterNumber(a.title);
                    const numB = this.extractChapterNumber(b.title);
                    return numA - numB;
                });
            }

            extractChapterNumber(text) {
                const matches = text.match(/(\d+(?:\.\d+)?)/);
                return matches ? parseFloat(matches[0]) : 0;
            }

            async getChapterImages(chapterUrl) {
                return await this.retryOperation(async () => {
                    await this.navigateTo(chapterUrl);
                    const result = await this.executeInFrame(`
                        (function() {
                            const selectors = [
                                'img.chapter-image',
                                '.chapter-content img',
                                '.reader-content img',
                                '.page-image img',
                                'img[src*="chapter"]',
                                'img[data-src*="chapter"]'
                            ];
                            
                            const images = [];
                            for (const selector of selectors) {
                                const elements = document.querySelectorAll(selector);
                                if (elements.length > 0) {
                                    elements.forEach(img => {
                                        const src = img.src || img.dataset.src || img.dataset.lazySrc || img.getAttribute('data-lazy-src');
                                        if (src && !src.includes('avatar') && !src.includes('logo') && !src.includes('placeholder')) {
                                            // Vérifier si l'image est visible
                                            const rect = img.getBoundingClientRect();
                                            const isVisible = rect.width > 50 && rect.height > 50;
                                            if (isVisible || img.naturalWidth > 100) {
                                                images.push({
                                                    src: src,
                                                    alt: img.alt || '',
                                                    width: img.naturalWidth || img.width,
                                                    height: img.naturalHeight || img.height
                                                });
                                            }
                                        }
                                    });
                                    if (images.length > 0) break;
                                }
                            }
                            return images;
                        })();
                    `);
                    
                    this.log(`🖼️ ${result.length} images trouvées`, 'info');
                    return result;
                });
            }

            async waitForPause() {
                while (this.isPaused && !this.shouldStop) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
            }

            pause() {
                this.isPaused = true;
                this.log("⏸️ Scraping en pause", 'warn');
            }

            resume() {
                this.isPaused = false;
                this.log("▶️ Scraping repris", 'info');
            }

            stop() {
                this.shouldStop = true;
                this.log("⏹️ Arrêt du scraping...", 'warn');
            }

            updateElapsedTime() {
                if (this.startTime) {
                    const elapsed = Math.floor((Date.now() - this.startTime) / 1000);
                    this.updateCallback('stats', { timeElapsed: elapsed });
                }
            }

            async scrapeManga() {
                this.startTime = Date.now();
                this.log("🚀 Démarrage du scraping optimisé...", 'info');
                
                try {
                    // Timer pour mise à jour du temps
                    const timeInterval = setInterval(() => this.updateElapsedTime(), 1000);
                    
                    // Obtenir le titre
                    await this.getMangaTitle();
                    this.updateCallback('status', `📚 Scraping: ${this.result.mangaTitle}`);
                    
                    // Obtenir les chapitres
                    const chapters = await this.getChapterLinks();
                    if (chapters.length === 0) {
                        throw new Error("Aucun chapitre trouvé");
                    }
                    
                    // Traiter chaque chapitre
                    for (let i = 0; i < chapters.length; i++) {
                        if (this.shouldStop) break;
                        
                        await this.waitForPause();
                        
                        this.currentChapterIndex = i;
                        const chapter = chapters[i];
                        
                        this.log(`📖 Traitement ${i+1}/${chapters.length}: ${chapter.title}`, 'info');
                        this.updateCallback('progress', {
                            value: (i / chapters.length) * 100,
                            text: `Chapitre ${i+1}/${chapters.length}`
                        });
                        
                        const images = await this.getChapterImages(chapter.url);
                        this.result.chapters.push({
                            title: chapter.title,
                            url: chapter.url,
                            images: images,
                            pageCount: images.length
                        });
                        
                        this.result.totalImages += images.length;
                        this.updateCallback('stats', { 
                            images: this.result.totalImages,
                            processed: i + 1
                        });
                    }
                    
                    clearInterval(timeInterval);
                    this.result.scrapingTime = Date.now() - this.startTime;
                    
                    this.log(`🎉 Scraping terminé! ${this.result.chapters.length} chapitres, ${this.result.totalImages} images`, 'success');
                    this.updateCallback('complete', this.result);
                    
                } catch (error) {
                    this.log(`💥 Erreur critique: ${error.message}`, 'error');
                    throw error;
                }
            }
        }

        // Contrôleur UI
        document.addEventListener('DOMContentLoaded', function() {
            const startBtn = document.getElementById('startBtn');
            const pauseBtn = document.getElementById('pauseBtn');
            const stopBtn = document.getElementById('stopBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const logElement = document.getElementById('log');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            const statusElement = document.getElementById('status');
            
            // Éléments des stats
            const chaptersCountEl = document.getElementById('chaptersCount');
            const imagesCountEl = document.getElementById('imagesCount');
            const processedCountEl = document.getElementById('processedCount');
            const timeElapsedEl = document.getElementById('timeElapsed');
            
            let scraper = null;
            let resultData = null;
            let isPaused = false;
            
            function addLogEntry(message, level = 'info') {
                const entry = document.createElement('div');
                entry.className = `log-entry log-${level}`;
                entry.textContent = message;
                logElement.appendChild(entry);
                logElement.scrollTop = logElement.scrollHeight;
                
                // Limiter le nombre d'entrées de log
                if (logElement.children.length > 200) {
                    logElement.removeChild(logElement.firstChild);
                }
            }
            
            function clearLog() {
                logElement.innerHTML = '';
            }
            
            function formatTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            }
            
            // Gestion de l'iframe toggle
            const iframeContainer = document.getElementById('iframeContainer');
            const iframeToggle = document.getElementById('iframeToggle');
            
            iframeToggle.addEventListener('click', function() {
                if (iframeContainer.classList.contains('iframe-collapsed')) {
                    iframeContainer.classList.remove('iframe-collapsed');
                    iframeToggle.textContent = 'Réduire';
                } else {
                    iframeContainer.classList.add('iframe-collapsed');
                    iframeToggle.textContent = 'Développer';
                }
            });
            
            startBtn.addEventListener('click', async function() {
                const mangaUrl = document.getElementById('mangaUrl').value.trim();
                const delay = parseInt(document.getElementById('delayInput').value) || 800;
                const maxRetries = parseInt(document.getElementById('maxRetries').value) || 3;
                
                if (!mangaUrl) {
                    alert('⚠️ Veuillez entrer une URL');
                    return;
                }
                
                clearLog();
                startBtn.disabled = true;
                pauseBtn.disabled = false;
                stopBtn.disabled = false;
                downloadBtn.disabled = true;
                isPaused = false;
                
                // Reset stats
                chaptersCountEl.textContent = '0';
                imagesCountEl.textContent = '0';
                processedCountEl.textContent = '0';
                timeElapsedEl.textContent = '0s';
                
                scraper = new OptimizedMangaScraper(mangaUrl, delay, maxRetries, (type, data) => {
                    switch(type) {
                        case 'log':
                            addLogEntry(data.message, data.level);
                            break;
                        case 'status':
                            statusElement.textContent = data;
                            break;
                        case 'progress':
                            progressBar.value = data.value;
                            progressText.textContent = `${Math.round(data.value)}% - ${data.text}`;
                            break;
                        case 'stats':
                            if (data.chapters) chaptersCountEl.textContent = data.chapters;
                            if (data.images) imagesCountEl.textContent = data.images;
                            if (data.processed) processedCountEl.textContent = data.processed;
                            if (data.timeElapsed !== undefined) timeElapsedEl.textContent = formatTime(data.timeElapsed);
                            break;
                        case 'complete':
                            resultData = data;
                            downloadBtn.disabled = false;
                            statusElement.textContent = `✅ Terminé! ${data.chapters.length} chapitres, ${data.totalImages} images (${formatTime(Math.floor(data.scrapingTime / 1000))})`;
                            break;
                    }
                });
                
                try {
                    await scraper.scrapeManga();
                } catch (error) {
                    addLogEntry(`💥 Erreur: ${error.message}`, 'error');
                    statusElement.textContent = `❌ Erreur: ${error.message}`;
                } finally {
                    startBtn.disabled = false;
                    pauseBtn.disabled = true;
                    stopBtn.disabled = true;
                    pauseBtn.textContent = '⏸️ Pause';
                }
            });
            
            pauseBtn.addEventListener('click', function() {
                if (!scraper) return;
                
                if (isPaused) {
                    scraper.resume();
                    pauseBtn.textContent = '⏸️ Pause';
                    isPaused = false;
                } else {
                    scraper.pause();
                    pauseBtn.textContent = '▶️ Reprendre';
                    isPaused = true;
                }
            });
            
            stopBtn.addEventListener('click', function() {
                if (scraper) {
                    scraper.stop();
                    statusElement.textContent = '🛑 Arrêt en cours...';
                }
            });
            
            downloadBtn.addEventListener('click', function() {
                if (!resultData) return;
                
                const blob = new Blob([JSON.stringify(resultData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${resultData.mangaTitle || 'manga'}_data.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });
        });

        // Gestionnaire de communication iframe
        window.addEventListener('message', (event) => {
            const iframe = document.getElementById('scraperFrame');
            if (event.source !== iframe.contentWindow) return;
            
            if (event.data.type === 'execute') {
                try {
                    const result = new Function('return ' + event.data.code)();
                    iframe.contentWindow.postMessage({
                        type: 'result',
                        result: result
                    }, '*');
                } catch (error) {
                    iframe.contentWindow.postMessage({
                        type: 'error',
                        error: error.message
                    }, '*');
                }
            }
        });
    </script>
</body>
</html>
